---
layout: default
---
<article class="container-page py-14">
  {% if page.eyebrow %}<div class="text-xs font-mono uppercase tracking-wider text-axal-purple">{{ page.eyebrow }}</div>{% endif %}
  {% if page.title %}<h1 class="mt-2">{{ page.title }}</h1>{% endif %}
  {% if page.subtitle %}<p class="mt-4 max-w-2xl text-lg text-axal-gray-700">{{ page.subtitle }}</p>{% endif %}
  <div class="prose-axal mt-10">
    {{ content }}
  </div>
</article>
