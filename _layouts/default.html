<!doctype html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body class="min-h-screen flex flex-col bg-axal-paper text-axal-ink">
  <a href="#main" class="axal-skip">Skip to content</a>
  {% include header.html %}
  <main id="main" class="flex-1">
    {{ content }}
  </main>
  {% include footer.html %}
  <script>
    (function(){
      var btn=document.querySelector("[data-axal-mobile-toggle]");
      var menu=document.querySelector("[data-axal-mobile-menu]");
      if(btn&&menu){btn.addEventListener("click",function(){menu.classList.toggle("hidden");});}
    })();
  </script>
</body>
</html>
