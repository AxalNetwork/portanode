---
layout: default
---
<section class="container-page py-10" style="max-width:1400px;">
  {% if page.eyebrow %}<div class="text-xs font-mono uppercase tracking-wider text-axal-purple">{{ page.eyebrow }}</div>{% endif %}
  {% if page.title %}<h1 class="mt-2 text-3xl font-semibold">{{ page.title }}</h1>{% endif %}
  {% if page.subtitle %}<p class="mt-3 max-w-2xl text-axal-gray-700">{{ page.subtitle }}</p>{% endif %}

  <link rel="stylesheet" href="{{ '/assets/configurator/bundle.css' | relative_url }}" />
  <noscript>
    <div class="mt-8 p-6 rounded-card border border-axal-gray-100 bg-axal-gray-50">
      The interactive configurator requires JavaScript. Browse our
      <a href="/stacks/" class="text-axal-purple underline">reference stacks</a> or
      <a href="/specs/" class="text-axal-purple underline">spec sheets</a> instead.
    </div>
  </noscript>

  <div id="axal-configurator" class="mt-8" data-cfg-mount></div>

  <script>
    // Inject backend wiring before the configurator bundle boots.
    window.AXAL_API_BASE = {{ site.api_base_url | default: '' | jsonify }};
    window.AXAL_TURNSTILE_SITE_KEY = {{ site.turnstile_site_key | default: '' | jsonify }};
  </script>
  <script type="module" src="{{ '/assets/configurator/bundle.js' | relative_url }}"></script>

  <div class="mt-12 prose-axal text-sm text-axal-gray-700">
    {{ content }}
  </div>
</section>
