---
layout: default
---
<article class="container-page py-14">
  <header class="max-w-3xl">
    <div class="text-xs font-mono uppercase tracking-wider text-axal-purple">
      {{ page.date | date: "%b %d, %Y" }}{% if page.author %} · {{ page.author }}{% endif %}
    </div>
    <h1 class="mt-2">{{ page.title }}</h1>
    {% if page.subtitle %}<p class="mt-4 text-lg text-axal-gray-700">{{ page.subtitle }}</p>{% endif %}
  </header>
  <div class="prose-axal mt-10">
    {{ content }}
  </div>
</article>
