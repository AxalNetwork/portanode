---
layout: default
---
<article class="container-page py-14">
  <div class="text-xs font-mono uppercase tracking-wider text-axal-gray">Legal</div>
  <h1 class="mt-2">{{ page.title }}</h1>
  {% if page.updated %}<div class="mt-2 text-sm text-axal-gray">Last updated {{ page.updated | date: "%B %d, %Y" }}</div>{% endif %}
  <div class="prose-axal mt-8">
    {{ content }}
  </div>
</article>
