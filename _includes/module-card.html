{%- assign m = include.module -%}
<a href="{{ m.url | relative_url }}" class="card group block no-underline">
  <div class="flex items-start justify-between gap-4">
    <div>
      <div class="text-xs font-mono uppercase tracking-wider text-axal-gray">{{ m.category | default: "Module" }}</div>
      <h3 class="mt-1 text-xl font-semibold text-axal-ink group-hover:text-axal-purple">{{ m.title }}</h3>
    </div>
    {% if m.sku %}<span class="badge font-mono">{{ m.sku }}</span>{% endif %}
  </div>
  {% if m.summary %}<p class="mt-3 text-sm text-axal-gray-700">{{ m.summary }}</p>{% endif %}
  <div class="mt-5 flex items-end justify-between">
    {% if m.price %}
      {% include price-display.html amount=m.price unit=m.price_unit %}
    {% else %}<span></span>{% endif %}
    <span class="text-sm font-medium text-axal-purple">View →</span>
  </div>
</a>
