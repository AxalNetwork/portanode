<div id="axal-cookie-banner" class="fixed inset-x-4 bottom-4 z-50 hidden rounded-card border border-axal-gray-100 bg-white p-4 shadow-card md:left-auto md:right-4 md:max-w-md" role="dialog" aria-live="polite" aria-label="Cookie preferences">
  <p class="text-sm text-axal-gray-700">We use a small number of cookies to make AXAL work and to understand how it's used. You can opt out anytime.</p>
  <div class="mt-3 flex flex-wrap gap-2">
    <button type="button" class="btn btn-primary text-xs" data-axal-cookie="accept">Accept</button>
    <button type="button" class="btn btn-outline text-xs" data-axal-cookie="reject">Reject</button>
    <a href="{{ '/legal/cookies/' | relative_url }}" class="btn btn-ghost text-xs">Learn more</a>
  </div>
</div>
<script>
(function(){
  try{
    var key="axal.cookie.consent";
    var el=document.getElementById("axal-cookie-banner");
    if(!el) return;
    if(!localStorage.getItem(key)){ el.classList.remove("hidden"); }
    el.addEventListener("click", function(e){
      var t=e.target.closest("[data-axal-cookie]");
      if(!t) return;
      localStorage.setItem(key, t.getAttribute("data-axal-cookie"));
      el.classList.add("hidden");
    });
  }catch(e){}
})();
</script>
