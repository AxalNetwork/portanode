title: "AXAL"
tagline: "Modular infrastructure, built to ship."
description: >-
  AXAL is a modular infrastructure eCommerce platform. Configure compute,
  network, and storage modules into deployable stacks.
url: "https://axal.pages.dev"
baseurl: ""

author:
  name: "AXAL"
  email: "hello@axal.dev"

# Backend API base — overridden per-environment by build env. Empty = same-
# origin (Cloudflare Pages → Worker rewrites apply).
api_base_url: ""

# Cloudflare Turnstile site key (public). The Worker validates the token
# server-side using TURNSTILE_SECRET_KEY. The 1x… key is the documented
# always-passes test key, safe to keep in the repo for dev.
turnstile_site_key: "1x00000000000000000000AA"

brand:
  primary: "#6B21A8"
  primary_light: "#A855F7"
  primary_lighter: "#C084FC"
  ink: "#0B0B0F"
  paper: "#FAFAF7"
  gray: "#6B7280"

permalink: "/:collection/:slug/"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-include-cache

collections:
  modules:
    output: true
    permalink: "/modules/:slug/"
  stacks:
    output: true
    permalink: "/stacks/:slug/"
  use_cases:
    output: true
    permalink: "/use-cases/:slug/"
  specs:
    output: false
  legal:
    output: true
    permalink: "/legal/:slug/"

defaults:
  - scope:
      path: ""
      type: "modules"
    values:
      layout: "module"
  - scope:
      path: ""
      type: "stacks"
    values:
      layout: "stack"
  - scope:
      path: ""
      type: "use_cases"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "legal"
    values:
      layout: "legal"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

include:
  - _redirects

exclude:
  - vendor
  - configurator
  - Gemfile
  - Gemfile.lock
  - README.md
  - replit.md
  - node_modules
  - package.json
  - package-lock.json
  - tailwind.config.js
  - scripts
  - attached_assets
  - .local
  - .agents
  - .bundle
  - .cache
  - .replit
  - cloudflare.toml
  - netlify.toml
  - github.toml

sass:
  style: compressed

highlighter: rouge
